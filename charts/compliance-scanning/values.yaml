global:
  localClusterDomain: local.example.com

compliance:
  # ScanSetting configuration
  scanSetting:
    name: compliance-scan-setting
    # Enable automatic remediation
    autoApplyRemediations: true
    # Schedule scan 
    schedule: ""
    # Set scanning tolerations
    scanTolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
    # Node selector for scanner pods
    nodeSelector: {}
  # (Future look at creating a TailoredProfile for ZT)
  scanSettingBinding:
    name: compliance-scan-binding
    # Profile in oc get profiles.compliance -n openshift-compliance
    profile: "rhcos4-stig"
  # Storage configuration for scan results
  storage:
    # Enable PVC creation
    enabled: true
    pvc:
      name: compliance-scan-results
      storageClass: ""
      size: "2Gi"
      accessMode: "ReadWriteOnce"
  # Results viewer  image with access to oscap to create html output
  resultsViewer:
    enabled: true
    name: compliance-results-viewer
    # TBD  make this one of the utility container images from VP team for performing the oscap operations on results
    image: "registry.access.redhat.com/ubi9/ubi:latest"
    # Mount path for scan results
    mountPath: "/compliance-results"
  # Remediation job configuration
  remediationJob:
    # Job name
    name: compliance-remediation-job
    # Container image with kubectl and jq
    image: "registry.access.redhat.com/ubi9/ubi:latest"
    # Service account configuration
    serviceAccount:
      name: compliance-remediation-sa
    # RBAC configuration
    clusterRole:
      name: compliance-remediation-role
    clusterRoleBinding:
      name: compliance-remediation-binding
    # Resource limits and requests
    resources:
      limits:
        cpu: "200m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    # Security context
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
        add:
        - NET_BIND_SERVICE
      readOnlyRootFilesystem: false
      seccompProfile:
        type: RuntimeDefault
    # Node selector (optional)
    nodeSelector: {}
    # Tolerations (optional)
    tolerations: []
    # Affinity (optional)
    affinity: {}
